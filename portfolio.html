<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | LEE HYUN NA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f9f9f9; color: #1a1a1a; }
        
        .cat-btn {
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            background: #eee;
            color: #888;
            transition: 0.3s;
        }
        .cat-btn.active, .cat-btn:hover {
            background: #111;
            color: #fff;
        }

        .project-card .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            backdrop-filter: blur(4px);
        }
        .project-card:hover .overlay { opacity: 1; }
        
        .view-btn {
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-6 py-8 md:px-12 max-w-7xl mx-auto">
        <div class="font-bold text-lg tracking-tighter uppercase cursor-pointer" onclick="location.href='index.html'">LEE HYUN NA</div>
        <div class="hidden md:flex space-x-8">
            <a href="index.html" class="text-sm text-gray-500">홈</a>
            <a href="about.html" class="text-sm text-gray-500">소개</a>
            <a href="portfolio.html" class="text-sm font-bold">포트폴리오</a>
            <a href="skills.html" class="text-sm text-gray-500">skills</a>
            <a href="contact.html" class="text-sm text-gray-500">연락처</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 md:px-12 pt-16 pb-32">
        <h1 class="text-4xl font-bold mb-12 text-left">포트폴리오</h1>

        <div class="flex flex-wrap gap-3 mb-16" id="category-container">
            <button class="cat-btn active" onclick="filterProjects('all')">전체</button>
            <button class="cat-btn" onclick="filterProjects('웹디자인')">웹디자인</button>
            <button class="cat-btn" onclick="filterProjects('브랜딩')">브랜딩</button>
            <button class="cat-btn" onclick="filterProjects('상세페이지')">상세페이지</button>
            <button class="cat-btn" onclick="filterProjects('배너')">배너</button>
            <button class="cat-btn" onclick="filterProjects('UX/UI')">UX/UI</button>
            <button class="cat-btn" onclick="filterProjects('영상')">영상</button>
            <button class="cat-btn" onclick="filterProjects('AI비주얼')">AI비주얼</button>
            <button class="cat-btn" onclick="filterProjects('콘텐츠')">콘텐츠</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="project-grid">
            
            <div class="project-card group cursor-pointer" data-category="상세페이지" onclick="location.href='project-detail.html'">
                <div class="relative aspect-square rounded-3xl overflow-hidden bg-gray-200 mb-6">
                    <img src="images/main1.jpg" class="w-full h-full object-cover">
                    <div class="overlay">
                        <span class="view-btn">프로젝트 보기</span>
                    </div>
                </div>
                <h4 class="font-bold text-lg mb-1 text-left">바닐라슈 (VanillaShoes)</h4>
                <p class="text-xs text-gray-600 mb-2 uppercase font-bold text-left">사용툴 Photoshop, Figma</p>
                <p class="text-sm text-gray-500 text-left">상세페이지</p>
            </div>

            <div class="project-card group cursor-pointer" data-category="브랜딩" onclick="location.href='project-detail-branding.html'">
                <div class="relative aspect-square rounded-3xl overflow-hidden bg-gray-200 mb-6">
                    <img src="images/main2.jpg" class="w-full h-full object-cover">
                    <div class="overlay">
                        <span class="view-btn">프로젝트 보기</span>
                    </div>
                </div>
                <h4 class="font-bold text-lg mb-1 text-left">브랜드 리뉴얼</h4>
                <p class="text-xs text-gray-600 mb-2 uppercase font-bold text-left">사용툴 Illustrator, Photoshop</p>
                <p class="text-sm text-gray-500 text-left">브랜딩</p>
            </div>

            <div class="project-card group cursor-pointer" data-category="브랜딩" onclick="location.href='project-detail-branding.html'">
                <div class="relative aspect-square rounded-3xl overflow-hidden bg-gray-200 mb-6">
                    <img src="images/main3.jpg" class="w-full h-full object-cover">
                    <div class="overlay">
                        <span class="view-btn">프로젝트 보기</span>
                    </div>
                </div>
                <h4 class="font-bold text-lg mb-1 text-left">로고 디자인</h4>
                <p class="text-xs text-gray-600 mb-2 uppercase font-bold text-left">사용툴 Illustrator</p>
                <p class="text-sm text-gray-500 text-left">CI/BI 디자인</p>
            </div>

        </div>
    </main>

    <script>
        function filterProjects(category) {
            const btns = document.querySelectorAll('.cat-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const cards = document.querySelectorAll('.project-card');
            cards.forEach(card => {
                const cardCategory = card.getAttribute('data-category');
                if (category === 'all' || cardCategory === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
