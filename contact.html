            .email-button { width: auto; padding: 18px 36px; font-size: 16px; }
        }
        .email-button:hover {
            background-color: #333;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);

        /* 전화 버튼 */
        .tel-button {

            justify-content: center;
