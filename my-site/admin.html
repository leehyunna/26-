<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background: #fcfcfc; }
        .admin-card { background: white; border: 1px solid #eee; border-radius: 24px; padding: 2rem; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="login-zone" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-12 rounded-[40px] shadow-sm border border-gray-100 w-full max-w-md text-center">
            <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-8">
                <i data-lucide="lock" class="text-gray-300"></i>
            </div>
            <h2 class="text-2xl font-bold mb-8">Admin Access</h2>
            <input type="password" id="admin-pw" placeholder="Password" class="w-full bg-gray-50 p-4 rounded-xl mb-4 text-center outline-none focus:ring-2 ring-black/5 font-bold">
            <button onclick="checkAuth()" class="w-full bg-black text-white py-4 rounded-xl font-bold hover:bg-gray-800 transition-all">로그인</button>
        </div>
    </div>

    <div id="admin-zone" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-16">
            <h1 class="text-3xl font-bold tracking-tighter">Dashboard</h1>
            <button onclick="location.href='index.html'" class="text-xs font-bold uppercase tracking-widest bg-gray-100 px-6 py-3 rounded-full hover:bg-black hover:text-white transition-all">View Site</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <div class="lg:col-span-1">
                <div class="admin-card sticky top-12">
                    <h3 class="font-bold mb-6 flex items-center gap-2"><i data-lucide="plus" size="18"></i> Add Project</h3>
                    <div class="space-y-4">
                        <input type="text" id="p-title" placeholder="Project Title" class="w-full border-b py-3 outline-none focus:border-black transition-colors text-sm">
                        <input type="text" id="p-cat" placeholder="Category" class="w-full border-b py-3 outline-none focus:border-black transition-colors text-sm">
                        <input type="text" id="p-img" placeholder="Image URL" class="w-full border-b py-3 outline-none focus:border-black transition-colors text-sm">
                        <button onclick="saveProject()" class="w-full bg-black text-white py-4 rounded-xl font-bold text-xs uppercase tracking-widest mt-4">Save Project</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h3 class="font-bold mb-6 text-gray-400 uppercase text-[11px] tracking-widest">Manage Work</h3>
                <div id="p-list" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        function checkAuth() {
            if(document.getElementById('admin-pw').value === "1033") {
                document.getElementById('login-zone').classList.add('hidden');
                document.getElementById('admin-zone').classList.remove('hidden');
                lucide.createIcons();
                loadProjects();
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        let db = [{ id: 1, title: 'Sample Project', cat: 'Web Design', img: 'https://via.placeholder.com/400' }];

        function saveProject() {
            const title = document.getElementById('p-title').value;
            const cat = document.getElementById('p-cat').value;
            const img = document.getElementById('p-img').value;
            if(!title || !cat) return alert("내용을 입력해주세요.");
            
            db.push({ id: Date.now(), title, cat, img });
            loadProjects();
            alert("저장되었습니다.");
        }

        function loadProjects() {
            const list = document.getElementById('p-list');
            list.innerHTML = db.map(p => `
                <div class="bg-white border border-gray-100 p-6 rounded-3xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${p.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <h4 class="font-bold text-sm">${p.title}</h4>
                            <p class="text-[11px] text-gray-400 uppercase tracking-widest">${p.cat}</p>
                        </div>
                    </div>
                    <button onclick="deleteP(${p.id})" class="text-red-400 hover:text-red-600 transition-colors"><i data-lucide="trash-2" size="18"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteP(id) {
            if(confirm("삭제하시겠습니까?")) {
                db = db.filter(p => p.id !== id);
                loadProjects();
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>S
